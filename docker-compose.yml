services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketplace
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      BUNDLE_PATH: /usr/local/bundle
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
      - storage:/rails/storage
      - tmp:/rails/tmp
    command: bash -lc "bundle check || bundle install && bin/rails db:prepare && bin/rails server -b 0.0.0.0 -p 3000"
    stdin_open: true
    tty: true

volumes:
  bundle:
  storage:
  tmp: